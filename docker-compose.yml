services:
  backend:
    image: ketbom/minepanel-backend:latest
    ports:
      - '${BACKEND_PORT:-8091}:8091'
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET} # Required. Generate with: openssl rand -base64 32
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-2d}
      - ALLOW_INSECURE_AUTH_COOKIES=${ALLOW_INSECURE_AUTH_COOKIES:-false}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - PASSWORD_RESET_TOKEN_EXPIRES_IN_MINUTES=${PASSWORD_RESET_TOKEN_EXPIRES_IN_MINUTES:-60}
      - BASE_DIR=${BASE_DIR:-$PWD}
      - COMPOSE_PROJECT=${COMPOSE_PROJECT:-}
      - BASE_PATH=${BASE_PATH:-}
    volumes:
      - ${BASE_DIR:-$PWD}/servers:/app/servers
      - /var/run/docker.sock:/var/run/docker.sock
      - ${BASE_DIR:-$PWD}/data:/app/data
    networks:
      - minepanel-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "const basePath = process.env.BASE_PATH || \"\"; const path = basePath + \"/health\"; require(\"http\").get(\"http://localhost:8091\" + path, (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on(\"error\", () => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: ketbom/minepanel-frontend:latest
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    environment:
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8091}
      - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-}
      - NEXT_PUBLIC_DEFAULT_LANGUAGE=${NEXT_PUBLIC_DEFAULT_LANGUAGE:-en}
      # Runtime value should match the build-time value if the image was built with a custom frontend base path.
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - minepanel-network
    restart: unless-stopped
  # MC Proxy Router - Routes Minecraft Java Edition traffic by hostname (optional)
  # Note: Only works with Java Edition (TCP). Bedrock uses UDP and doesn't support proxy routing.
  # Enable with: docker compose --profile proxy up -d
  # Requires DNS wildcard: *.mc.yourdomain.com -> server IP
  mc-router:
    image: itzg/mc-router:1.39.1
    container_name: mc-router
    profiles:
      - proxy
    ports:
      - '${MC_PROXY_PORT:-25565}:25565'
    environment:
      - ROUTES_CONFIG=/data/routes.json
      - ROUTES_CONFIG_WATCH=true
    volumes:
      - ${BASE_DIR:-$PWD}/data/proxy:/data
    networks:
      - minepanel-network
    restart: unless-stopped

networks:
  minepanel-network:
    name: minepanel-network
    driver: bridge
